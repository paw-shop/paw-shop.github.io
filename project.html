<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proyecto | Alphy</title>
    <meta
      name="description"
      content="Detalle de proyecto del portfolio de Alphy."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="./images/brand/pawshop-logo.png" />
    <link rel="apple-touch-icon" href="./images/brand/pawshop-logo.png" />
    <link rel="stylesheet" href="./styles.css?v=21" />
  </head>
  <body>
    <div class="page-shell project-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="Pawshop">
          <span class="brand-mark" aria-hidden="true">
            <img src="./images/brand/pawshop-logo.png" alt="" />
          </span>
          <span class="brand-text">Pawshop</span>
        </a>
        <nav class="nav">
          <a href="./index.html#proyectos" data-i18n="nav.projects">Proyectos</a>
          <a href="./index.html#sobre-mi" data-i18n="nav.about">Sobre mi</a>
          <a href="./index.html#comunicados" data-i18n="nav.announcements">Comunicados</a>
          <a href="./index.html#contacto" data-i18n="nav.contact">Contacto</a>
          <button class="lang-toggle" type="button" id="lang-toggle" aria-label="Cambiar idioma">
            <span data-lang-option="es">ES</span>
            <span data-lang-option="en">EN</span>
          </button>
        </nav>
      </header>

      <main class="project-detail" id="project-detail">
        <section class="project-detail-hero">
          <div class="project-detail-copy reveal">
            <p class="eyebrow" data-i18n="detail.eyebrow">Project Detail</p>
            <h1 id="detail-title">Cargando proyecto...</h1>
            <div class="project-detail-text">
              <p class="project-detail-description is-collapsed" id="detail-description"></p>
              <button class="project-toggle" id="detail-description-toggle" type="button">
                Show more
              </button>
            </div>
            <div class="project-tags" id="detail-tags"></div>
            <div class="hero-actions">
              <a class="button primary" id="detail-gumroad-link" href="#" target="_blank" rel="noreferrer">
                <span class="store-mark store-mark-gumroad" aria-hidden="true">
                  <img src="./images/brand/gumroad.svg" alt="" />
                </span>
                <span data-i18n="detail.gumroad">View Gumroad</span>
              </a>
              <a class="button ghost" id="detail-booth-link" href="#" target="_blank" rel="noreferrer">
                <span class="store-mark store-mark-booth" aria-hidden="true">
                  <img src="./images/brand/booth.svg" alt="" />
                </span>
                <span data-i18n="detail.booth">View Booth</span>
              </a>
              <a class="button ghost" href="./index.html#proyectos" data-i18n="detail.back">Volver</a>
            </div>
          </div>
          <div class="project-detail-cover reveal" id="detail-cover"></div>
        </section>

        <section class="project-gallery-section reveal">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="detail.galleryEyebrow">Gallery</p>
            <h2 data-i18n="detail.galleryTitle">Imagenes del proyecto</h2>
          </div>
          <div class="project-gallery-grid" id="detail-gallery"></div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="site-footer-copy">
          <p class="site-footer-brand">
            <span class="brand-mark" aria-hidden="true">
              <img src="./images/brand/pawshop-logo.png" alt="" />
            </span>
            <span class="brand-text">Pawshop</span>
          </p>
          <p class="site-footer-note">Alphy / 3D artist portfolio</p>
        </div>
        <div class="site-footer-links">
          <a href="./terms.html" data-i18n="footer.terms">Terminos y condiciones</a>
        </div>
      </footer>
    </div>

    <script src="./project-detail.js?v=3"></script>
  </body>
</html>
