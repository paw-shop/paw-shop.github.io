<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proyecto | Alphy</title>
    <meta
      name="description"
      content="Detalle de proyecto del portfolio de Alphy."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell project-shell">
      <header class="topbar">
        <a class="brand" href="./index.html">Alphy</a>
        <nav class="nav">
          <a href="./index.html#proyectos">Proyectos</a>
          <a href="./index.html#sobre-mi">Sobre mi</a>
          <a href="./index.html#contacto">Contacto</a>
        </nav>
      </header>

      <main class="project-detail" id="project-detail">
        <section class="project-detail-hero">
          <div class="project-detail-copy reveal">
            <p class="eyebrow">Project Detail</p>
            <h1 id="detail-title">Cargando proyecto...</h1>
            <div class="project-detail-text">
              <p class="project-detail-description is-collapsed" id="detail-description"></p>
              <button class="project-toggle" id="detail-description-toggle" type="button">
                Ver mas
              </button>
            </div>
            <div class="project-tags" id="detail-tags"></div>
            <div class="hero-actions">
              <a class="button primary" id="detail-link" href="#" target="_blank" rel="noreferrer">
                Ver link del proyecto
              </a>
              <a class="button ghost" href="./index.html#proyectos">Volver</a>
            </div>
          </div>
          <div class="project-detail-cover reveal" id="detail-cover"></div>
        </section>

        <section class="project-gallery-section reveal">
          <div class="section-heading">
            <p class="eyebrow">Gallery</p>
            <h2>Imagenes del proyecto</h2>
          </div>
          <div class="project-gallery-grid" id="detail-gallery"></div>
        </section>
      </main>
    </div>

    <script src="./project-detail.js"></script>
  </body>
</html>
